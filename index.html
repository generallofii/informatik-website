<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Über mich</title>

    <style>
        /* Logo links mit Abstand */
        .logo {
            position: absolute;
            left: 2cm;
            top: 20px;
        }

        /* Text leicht rechts von der Mitte */
        .text {
            position: absolute;
            left: calc(50% + 2cm);
            top: 100px;
        }
    </style>

</head>
<body>

    <!-- Logo -->
    <img src="logo.png" alt="Mein Logo" class="logo" width="100">

    <!-- Text -->
    <div class="text">
        <h1>Über mich</h1>
        <p>Hallo! Ich bin ...</p>
    </div>

</body>
</html>
